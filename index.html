<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Master | Luxury Elite Edition</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #D4AF37; --black: #0A0A0A; --dark-grey: #151515; --white: #FFFFFF;
      --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #B8860B 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { font-family: 'Outfit', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

    /* --- Background 3D --- */
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

    /* --- Logo/Nav --- */
    nav { 
      position: fixed; top: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95);
      backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .main-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

    /* --- Hero --- */
    .hero { text-align: center; padding: 150px 20px 60px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .timing { border: 1px solid var(--gold); padding: 5px 20px; border-radius: 50px; font-size: 0.8rem; color: var(--gold); margin-top: 10px; display: inline-block; }

    /* --- Menu --- */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .card-lux { background: var(--dark-grey); border: 1px solid #333; transition: 0.4s; overflow: hidden; position: relative; }
    .card-lux:hover { border-color: var(--gold); transform: translateY(-10px); }
    .card-lux img { width: 100%; height: 250px; object-fit: cover; }
    .card-info { padding: 20px; text-align: center; }
    .price { font-size: 1.5rem; color: var(--gold); margin: 10px 0; display: block; font-weight: 700; }
    
    .btn-gold { 
      background: var(--gold-gradient); color: black; border: none; padding: 12px 25px; 
      font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 1px;
    }

    /* --- Cart Slide --- */
    #cart-slide {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
      background: #0d0d0d; z-index: 2000; transition: 0.5s; border-left: 2px solid var(--gold);
      display: flex; flex-direction: column;
    }
    #cart-slide.active { right: 0; }
    .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; }
    .qty-box { display: flex; align-items: center; gap: 10px; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 50px; }

    /* --- Checkout Modal --- */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: #111; padding: 30px; border: 1px solid var(--gold); width: 95%; max-width: 450px; text-align: center; }
    
    /* Bill Styling with Logo */
    #bill-canvas { background: white; color: black; padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 10px; }
    .bill-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #000; border-bottom: 2px solid #000; display: inline-block; margin-bottom: 10px; font-weight: 900; }
    
    .pay-options { display: flex; gap: 10px; margin-top: 20px; }
    .pay-btn { flex: 1; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: 900; border: none; }
    .cod { background: #333; color: white; }
    .online { background: #25D366; color: white; }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 50px; z-index: 9999; display: none; font-weight: bold; }
  </style>
</head>
<body>

<div id="bg-canvas"></div>
<audio id="crackSound" src="https://www.myinstants.com/media/sounds/egg-crack.mp3"></audio>

<nav>
  <div class="main-logo">EGG MASTER</div>
  <button onclick="toggleCart(true)" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 20px; border-radius:50px; cursor:pointer;">
    CART (<span id="cart-count">0</span>)
  </button>
</nav>

<div class="hero">
  <h1>Elite Egg Hub</h1>
  <div class="timing">9 AM - 2 PM | 7 PM - 12 AM</div>
</div>

<div class="container">
  <div class="grid" id="menu-grid"></div>
</div>

<div id="cart-slide">
  <div style="padding:30px; background:var(--gold-gradient); color:black; font-weight:900; display:flex; justify-content:space-between;">
    <span>YOUR ORDER</span>
    <button onclick="toggleCart(false)" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
  </div>
  <div class="cart-body" id="cart-items"></div>
  <div style="padding:30px; border-top:1px solid #333;">
    <h2 style="display:flex; justify-content:space-between; margin-bottom:20px;">
      Total: <span id="total-price" style="color:var(--gold);">₹0</span>
    </h2>
    <button class="btn-gold" onclick="openPaymentModal()">Place Order Now</button>
  </div>
</div>

<div id="checkout-modal" class="modal">
  <div class="modal-content">
    <div id="bill-canvas">
      <div class="bill-logo">🍳 EGG MASTER</div>
      <p style="font-size:0.8rem;">Gujarat's Best Taste</p>
      <div id="bill-items" style="text-align:left; margin:15px 0; font-family:monospace; font-size:0.9rem;"></div>
      <hr>
      <h3 id="bill-total" style="margin-top:10px;"></h3>
    </div>

    <div id="online-pay-section" style="display:none;">
      <h3 style="color:var(--gold); margin-bottom:10px;">SCAN & PAY ONLINE</h3>
      <img id="upi-qr" style="width:180px; border:5px solid white; margin-bottom:10px;">
      <p style="font-size:0.8rem; opacity:0.6;">ashishchavda9586@oksbi</p>
    </div>

    <p style="margin-top:20px;">Choose Payment Mode:</p>
    <div class="pay-options">
      <button class="pay-btn cod" onclick="finalizeOrder('Cash on Delivery (COD)')">COD</button>
      <button class="pay-btn online" onclick="showOnlinePayment()">Online Pay</button>
    </div>
    
    <button class="btn-gold" onclick="finalizeOrder('Online Paid')" id="done-btn" style="display:none; margin-top:15px;">I Have Paid - Send WhatsApp</button>
    
    <br>
    <button onclick="location.reload()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const PHONE = "+919586096174";
  const MY_UPI = "ashishchavda9586@oksbi";
  
  const menu = [
    { id: 1, name: "Boiled Egg Fry", price: 50, img: "https://i.ibb.co/xSdzbzzf/boild-egg-fry.jpg" },
    { id: 2, name: "Bombay Omlet", price: 60, img: "https://i.ibb.co/vv1xsk7G/bombe-omlet.jpg" },
    { id: 3, name: "Bread Omlet", price: 60, img: "https://i.ibb.co/JRS6Lcyc/bread-omlet.jpg" },
    { id: 4, name: "Egg Bhurji", price: 60, img: "https://i.ibb.co/4Rh3gjss/egg-bhurji.jpg" },
    { id: 5, name: "Egg Kheema", price: 60, img: "https://i.ibb.co/7NJbpHnw/egg-khima.jpg" },
    { id: 6, name: "Egg Lachko", price: 80, img: "https://i.ibb.co/LDhLfpZy/egg-Lachko.jpg" },
    { id: 7, name: "Egg Masala Tikka", price: 70, img: "https://i.ibb.co/8DgfRBnK/egg-mashala-tikka.jpg" },
    { id: 8, name: "Gujarati Egg Curry", price: , img: "https://i.ibb.co/sdhXXfNw/gujrati-egg-curry.jpg" },
    { id: 9, name: "Masala Egg", price: 50, img: "https://i.ibb.co/QvV7YG8W/masala-egg.jpg" },
    { id: 10, name: "Surti Gotalo", price: 80, img: "https://i.ibb.co/pv1FGXCr/surti-gotalo.jpg" }
  ];

  let cart = [];

  // --- 3D Background ---
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('bg-canvas').appendChild(renderer.domElement);
  const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(10, 3, 100, 16), new THREE.MeshPhongMaterial({ color: 0xD4AF37, wireframe: true }));
  scene.add(knot);
  scene.add(new THREE.AmbientLight(0xffffff, 1));
  camera.position.z = 30;

  function animate() { requestAnimationFrame(animate); knot.rotation.x += 0.005; renderer.render(scene, camera); }
  animate();

  // --- Menu UI ---
  function renderMenu() {
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = menu.map(item => `
      <div class="card-lux">
        <img src="${item.img}" alt="${item.name}">
        <div class="card-info">
          <h3>${item.name}</h3>
          <span class="price">₹${item.price}</span>
          <button class="btn-gold" onclick="addToCart(${item.id})">Add to selection</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id) {
    document.getElementById('crackSound').play();
    const item = menu.find(m => m.id === id);
    const existing = cart.find(c => c.id === id);
    if(existing) existing.qty++;
    else cart.push({...item, qty: 1});
    updateCartUI();
  }

  function removeFromCart(id) {
    const index = cart.findIndex(c => c.id === id);
    if(index > -1) {
      if(cart[index].qty > 1) cart[index].qty--;
      else cart.splice(index, 1);
    }
    updateCartUI();
  }

  function updateCartUI() {
    const list = document.getElementById('cart-items');
    let total = 0, count = 0;
    list.innerHTML = cart.map(i => {
      total += (i.price * i.qty); count += i.qty;
      return `<div class="cart-item">
        <div><b>${i.name}</b><br>₹${i.price * i.qty}</div>
        <div class="qty-box">
          <button onclick="removeFromCart(${i.id})" style="background:none; border:none; color:white; cursor:pointer;">-</button>
          <span>${i.qty}</span>
          <button onclick="addToCart(${i.id})" style="background:none; border:none; color:white; cursor:pointer;">+</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('total-price').innerText = "₹" + total;
    document.getElementById('cart-count').innerText = count;
  }

  function toggleCart(s) { document.getElementById('cart-slide').classList.toggle('active', s); }

  // --- Payment & Bill ---
  function openPaymentModal() {
    if(cart.length === 0) return alert("Pehle items select karein!");
    const total = document.getElementById('total-price').innerText;
    
    // Fill Bill for Screenshot
    document.getElementById('bill-items').innerHTML = cart.map(i => `${i.name} x ${i.qty} = ₹${i.price*i.qty}`).join('<br>');
    document.getElementById('bill-total').innerText = "GRAND TOTAL: " + total;
    
    // QR Code
    document.getElementById('upi-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${MY_UPI}&pn=EggMaster&am=${total.replace('₹','')}&cu=INR`;
    
    document.getElementById('checkout-modal').style.display = 'flex';
  }

  function showOnlinePayment() {
    document.getElementById('online-pay-section').style.display = 'block';
    document.getElementById('done-btn').style.display = 'block';
    document.querySelector('.pay-options').style.display = 'none';
  }

  async function finalizeOrder(method) {
    // Generate Bill Image (Auto Download)
    const canvas = await html2canvas(document.getElementById('bill-canvas'));
    const link = document.createElement('a');
    link.download = 'EggMaster_Bill.jpg';
    link.href = canvas.toDataURL();
    link.click();

    // Send WhatsApp
    let items = cart.map(i => `• ${i.name} (x${i.qty})`).join('%0A');
    const total = document.getElementById('total-price').innerText;
    const msg = `*EGG MASTER ORDER*%0A━━━━━━━━━━━━━━%0A${items}%0A━━━━━━━━━━━━━━%0A*TOTAL:* ${total}%0A*PAYMENT:* ${method}%0A%0A_Aavse maza!_`;
    window.open(`https://wa.me/${PHONE}?text=${msg}`, '_blank');
  }

  renderMenu();
</script>
</body>
</html>
