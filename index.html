<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Egg Master | Secure Elite</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Outfit:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root { --gold: #D4AF37; --black: #0A0A0A; --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #B8860B 100%); }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { font-family: 'Outfit', sans-serif; background: var(--black); color: white; overflow-x: hidden; }

    /* Sound Start Overlay */
    #start-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .start-btn { background: var(--gold-gradient); border: none; padding: 18px 40px; font-weight: 900; border-radius: 50px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 15px rgba(212,175,55,0.4); }

    nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--gold); }
    .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; font-weight: 900; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 85px 12px 30px; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; text-align: center; padding-bottom: 12px; position: relative; }
    .card img { width: 100%; height: 150px; object-fit: cover; }
    .card h3 { font-size: 0.85rem; margin: 8px 0 2px; height: 32px; overflow: hidden; padding: 0 5px; }
    
    /* Android Optimized Controls */
    .qty-box { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 8px; }
    .qty-btn { background: #1a1a1a; border: 1.5px solid var(--gold); color: var(--gold); width: 42px; height: 42px; border-radius: 50%; font-size: 1.4rem; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .qty-display { font-size: 1.2rem; font-weight: 700; min-width: 25px; }

    /* Cart Slide */
    #cart-slide { position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100%; background: #080808; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--gold); display: flex; flex-direction: column; }
    #cart-slide.active { right: 0; }
    .cart-head { padding: 20px; background: var(--gold-gradient); color: black; font-weight: 900; display: flex; justify-content: space-between; }

    /* Order Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
    .modal-content { background: #111; padding: 25px; border: 1px solid var(--gold); width: 100%; max-width: 400px; border-radius: 20px; }
    input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 14px; margin-top: 10px; border-radius: 10px; font-size: 16px; outline: none; }
    input:focus { border-color: var(--gold); }

    /* OFFICIAL BILL TEMPLATE (Hidden) */
    #bill-area { background: #fff; color: #000; padding: 40px; position: fixed; left: -9999px; width: 450px; text-align: center; border: 4px solid #000; }
    .bill-title { font-family: 'Playfair Display'; font-size: 30px; font-weight: 900; border-bottom: 3px solid #000; padding-bottom: 10px; }
    .bill-security { font-size: 11px; color: #666; font-family: monospace; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }
  </style>
</head>
<body>

<div id="start-overlay"><button class="start-btn" onclick="initApp()">START EGG MASTER 🍳</button></div>
<audio id="crackSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<nav>
  <div class="logo">EGG MASTER</div>
  <button onclick="toggleCart(true)" style="background:var(--gold-gradient); border:none; padding:8px 18px; border-radius:50px; font-weight:900; font-size:0.8rem;">
    CART (<span id="cart-count">0</span>)
  </button>
</nav>

<div class="grid" id="menu-grid"></div>

<div id="cart-slide">
  <div class="cart-head"><span>YOUR ITEMS</span> <span onclick="toggleCart(false)" style="font-size:1.5rem;">✕</span></div>
  <div id="cart-items" style="flex:1; overflow-y:auto; padding:20px;"></div>
  <div style="padding:20px; border-top:1px solid #222;">
    <h3 style="display:flex; justify-content:space-between;">Total: <span id="total-price" style="color:var(--gold)">₹0</span></h3>
    <button onclick="openForm()" style="width:100%; padding:16px; background:var(--gold-gradient); border:none; border-radius:12px; font-weight:900; margin-top:15px; font-size:1.1rem;">PROCEED TO BILL</button>
  </div>
</div>

<div id="order-modal" class="modal">
  <div class="modal-content">
    <h2 style="color:var(--gold); text-align:center;">ORDER DETAILS</h2>
    <input type="text" id="c-name" placeholder="Full Name">
    <input type="tel" id="c-phone" placeholder="Mobile Number">
    <textarea id="c-addr" placeholder="Full Delivery Address" rows="2"></textarea>
    <button onclick="getLocation()" id="loc-btn" style="width:100%; background:#222; color:var(--gold); border:1px dashed var(--gold); padding:12px; margin-top:12px; border-radius:10px; font-weight:700;">📍 Share Live Location</button>
    <input type="hidden" id="c-loc" value="Not Provided">
    
    <button onclick="generateSecureOrder()" style="width:100%; padding:18px; background:var(--gold-gradient); border:none; font-weight:900; margin-top:20px; border-radius:12px; font-size:1.2rem; box-shadow: 0 4px 15px rgba(212,175,55,0.3);">CONFIRM & SEND ORDER</button>
    <p onclick="document.getElementById('order-modal').style.display='none'" style="text-align:center; margin-top:15px; color:#666; font-size:0.9rem;">Go Back</p>
  </div>
</div>

<div id="bill-area">
  <div class="bill-title">🍳 EGG MASTER OFFICIAL</div>
  <div id="bill-meta" style="text-align:left; margin:20px 0; font-size:16px; line-height:1.6;"></div>
  <table style="width:100%; border-collapse:collapse; text-align:left; border-top:2px solid #000;">
    <thead><tr style="height:40px; border-bottom:1px solid #000;"><th>Item</th><th>Qty</th><th>Subtotal</th></tr></thead>
    <tbody id="bill-table-body" style="font-size:15px;"></tbody>
  </table>
  <div id="bill-grand-total" style="font-size:28px; font-weight:900; margin-top:20px; border-top:3px solid #000; padding-top:10px;"></div>
  <div class="bill-security">
    VERIFICATION HASH: <span id="v-hash"></span><br>
    ORDER ID: <span id="v-id"></span> | DATE: <span id="v-date"></span><br>
    <b style="color:red;">*THIS IMAGE IS YOUR OFFICIAL PROOF*</b>
  </div>
</div>

<script>
  const ADMIN_PHONE = "+919586096174";
  const menu = [
    { id: 1, name: "Boiled Egg Fry", price: 50, img: "https://i.ibb.co/xSdzbzzf/boild-egg-fry.jpg" },
    { id: 2, name: "Bombay Omlet", price: 50, img: "https://i.ibb.co/vv1xsk7G/bombe-omlet.jpg" },
    { id: 3, name: "Bread Omlet", price: 60, img: "https://i.ibb.co/JRS6Lcyc/bread-omlet.jpg" },
    { id: 4, name: "Egg Bhurji", price: 60, img: "https://i.ibb.co/4Rh3gjss/egg-bhurji.jpg" },
    { id: 5, name: "Egg Kheema", price: 60, img: "https://i.ibb.co/7NJbpHnw/egg-khima.jpg" },
    { id: 6, name: "Egg Lachko", price: 80, img: "https://i.ibb.co/LDhLfpZy/egg-Lachko.jpg" },
    { id: 7, name: "Egg Tikka", price: 60, img: "https://i.ibb.co/8DgfRBnK/egg-mashala-tikka.jpg" },
    { id: 10, name: "Surti Gotalo", price: 80, img: "https://i.ibb.co/pv1FGXCr/surti-gotalo.jpg" }
  ];

  let cart = [];

  function initApp() { document.getElementById('start-overlay').style.display = 'none'; }

  function renderMenu() {
    document.getElementById('menu-grid').innerHTML = menu.map(i => `
      <div class="card">
        <img src="${i.img}">
        <h3>${i.name}</h3>
        <p style="color:var(--gold); font-weight:700;">₹${i.price}</p>
        <div class="qty-box">
          <button class="qty-btn" onclick="updateQty(${i.id}, -1)">−</button>
          <span class="qty-display" id="q-${i.id}">0</span>
          <button class="qty-btn" onclick="updateQty(${i.id}, 1)">+</button>
        </div>
      </div>`).join('');
  }

  function updateQty(id, delta) {
    document.getElementById('crackSound').play();
    const item = menu.find(m => m.id === id);
    const cartIdx = cart.findIndex(c => c.id === id);

    if (delta === 1) {
      if (cartIdx > -1) cart[cartIdx].qty++;
      else cart.push({ ...item, qty: 1 });
    } else {
      if (cartIdx > -1) {
        cart[cartIdx].qty--;
        if (cart[cartIdx].qty === 0) cart.splice(cartIdx, 1);
      }
    }
    updateUI();
  }

  function updateUI() {
    let t = 0, c = 0;
    menu.forEach(m => {
      const ci = cart.find(x => x.id === m.id);
      document.getElementById(`q-${m.id}`).innerText = ci ? ci.qty : 0;
    });

    document.getElementById('cart-items').innerHTML = cart.map(i => {
      t += (i.price * i.qty); c += i.qty;
      return `<div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #1a1a1a; padding-bottom:8px;">
        <span>${i.name} (x${i.qty})</span><b>₹${i.price * i.qty}</b>
      </div>`;
    }).join('');

    document.getElementById('total-price').innerText = "₹" + t;
    document.getElementById('cart-count').innerText = c;
  }

  function toggleCart(s) { document.getElementById('cart-slide').classList.toggle('active', s); }
  function openForm() { if(cart.length > 0) document.getElementById('order-modal').style.display = 'flex'; }

  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => {
        document.getElementById('c-loc').value = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
        document.getElementById('loc-btn').innerText = "✅ Location Locked";
        document.getElementById('loc-btn').style.background = "#1a4a1a";
      });
    }
  }

  async function generateSecureOrder() {
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    const addr = document.getElementById('c-addr').value;
    const loc = document.getElementById('c-loc').value;

    if(!name || !phone || !addr) return alert("Please enter Name, Phone and Address!");

    // ANTI-CHEAT: Secure Admin Hash
    const total = document.getElementById('total-price').innerText;
    const orderID = "EM-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    const secureToken = btoa(`${name}|${total}|${orderID}`); // Base64 encoding for admin verification

    // Populate Hidden Bill
    document.getElementById('bill-meta').innerHTML = `<b>CUSTOMER:</b> ${name}<br><b>PHONE:</b> ${phone}<br><b>ADDRESS:</b> ${addr}`;
    document.getElementById('bill-table-body').innerHTML = cart.map(i => `
      <tr style="height:35px; border-bottom:1px solid #eee;"><td>${i.name}</td><td>${i.qty}</td><td>₹${i.price*i.qty}</td></tr>`).join('');
    document.getElementById('bill-grand-total').innerText = "TOTAL AMOUNT: " + total;
    document.getElementById('v-hash').innerText = secureToken;
    document.getElementById('v-id').innerText = orderID;
    document.getElementById('v-date').innerText = new Date().toLocaleString();

    // Generate JPG for Customer
    const canvas = await html2canvas(document.getElementById('bill-area'));
    const imgData = canvas.toDataURL("image/jpeg", 0.9);
    const link = document.createElement('a');
    link.download = `Bill_${name}_${orderID}.jpg`;
    link.href = imgData;
    link.click();

    // Prepare WhatsApp (Text only for info, Security in Token)
    const waText = `*🍳 NEW ORDER - EGG MASTER*%0A━━━━━━━━━━━━━━%0A🆔 *Order ID:* ${orderID}%0A👤 *Name:* ${name}%0A📍 *Addr:* ${addr}%0A💰 *TOTAL AMOUNT: ${total}*%0A━━━━━━━━━━━━━━%0A🗺️ *LOCATION:*%0A${loc}%0A━━━━━━━━━━━━━━%0A🔒 *ADMIN_LOCK:* ${secureToken}%0A━━━━━━━━━━━━━━%0A_Note: Bill photo has been saved to my phone. Forwarding it now!_`;

    window.location.href = `https://wa.me/${ADMIN_PHONE}?text=${waText}`;
  }

  renderMenu();
</script>
</body>
</html>
