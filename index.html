<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />

  <title>Egg Master | Luxury Elite</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root { --gold: #D4AF37; --black: #0A0A0A; --dark-grey: #121212; --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D37E 50%, #B8860B 100%); }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { font-family: 'Outfit', sans-serif; background: var(--black); color: white; overflow-x: hidden; width: 100%; }

    #start-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .start-btn { background: var(--gold-gradient); color: black; border: none; padding: 18px 35px; font-weight: 900; border-radius: 50px; font-size: 1rem; box-shadow: 0 0 20px rgba(212,175,55,0.4); }

    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

    nav { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--gold); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); font-weight: 900; }

    .lang-box { display: flex; gap: 3px; background: #1a1a1a; padding: 3px; border-radius: 50px; border: 1px solid #333; }
    .lang-btn { background: none; border: none; color: #777; font-size: 0.65rem; padding: 5px 8px; border-radius: 50px; font-weight: bold; }
    .lang-btn.active { background: var(--gold-gradient); color: black; }

    .hero { text-align: center; padding: 100px 15px 30px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .container { width: 100%; padding: 10px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-lux { background: var(--dark-grey); border: 1px solid #222; overflow: hidden; border-radius: 12px; }
    .card-lux img { width: 100%; height: 160px; object-fit: cover; }
    .card-info { padding: 12px; text-align: center; }
    .card-info h3 { font-size: 0.9rem; height: 35px; overflow: hidden; }
    .price { font-size: 1.1rem; color: var(--gold); margin: 5px 0; font-weight: 700; display: block; }
    
    .btn-gold { background: var(--gold-gradient); color: black; border: none; padding: 10px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 6px; font-size: 0.75rem; }

    #cart-slide { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: #080808; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--gold); display: flex; flex-direction: column; }
    #cart-slide.active { right: 0; }
    .cart-header { padding: 20px; background: var(--gold-gradient); color: black; font-weight: 900; display: flex; justify-content: space-between; }
    .cart-body { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }

    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
    .qty-box { display: flex; align-items: center; gap: 10px; border: 1px solid var(--gold); border-radius: 50px; padding: 4px 10px; }
    .qty-btn { background: none; border: none; color: var(--gold); font-size: 1.2rem; font-weight: 900; width: 25px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
    .modal-content { background: #111; padding: 20px; border: 1px solid var(--gold); width: 100%; max-width: 400px; border-radius: 15px; }
    .form-group { margin-bottom: 12px; text-align: left; }
    .form-group label { color: var(--gold); font-size: 0.75rem; display: block; margin-bottom: 4px; }
    .form-group input, .form-group textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-size: 16px; }

    #bill-area { background: white; color: black; padding: 30px; text-align: center; position: fixed; left: -9999px; width: 350px; border: 1px solid #000; }
  </style>
</head>
<body>

<div id="start-overlay"><button class="start-btn" onclick="initApp()">OPEN EGG MASTER 🍳</button></div>

<div class="hero">

</div>

<div class="container"><div class="grid" id="menu-grid"></div></div>

<div id="cart-slide">

    <button class="btn-gold" style="font-size:1rem;" id="btn-details" onclick="openOrderForm()">ENTER DETAILS</button>
  </div>
</div>

<div id="order-modal" class="modal">
  <div class="modal-content">
    <h3 id="form-head" style="color:var(--gold); margin-bottom:15px;">DELIVERY DETAILS</h3>
    <div class="form-group"><label id="label-name">Full Name</label><input type="text" id="cust-name"></div>
    <div class="form-group"><label id="label-phone">Mobile Number</label><input type="tel" id="cust-phone"></div>
    <div class="form-group"><label id="label-addr">Address</label><textarea id="cust-addr" rows="2"></textarea></div>
    <button class="btn-gold" style="background:#222; color:var(--gold); border:1px dashed var(--gold); margin-bottom:15px;" id="btn-loc" onclick="getLocation()">📍 Share Location</button>
    <input type="hidden" id="cust-loc" value="Not Shared">
    
    <div style="display:flex; gap:10px;">
      <button onclick="processFinal('COD')" style="flex:1; background:#444; color:white; border:none; padding:12px; border-radius:8px; font-weight:900;">COD</button>
      <button onclick="showQRSection()" id="btn-online" style="flex:1; background:#25D366; color:white; border:none; padding:12px; border-radius:8px; font-weight:900;">ONLINE</button>
    </div>

    <div id="qr-section" style="display:none; margin-top:20px; text-align:center;">
      <img id="upi-qr" style="width:140px; border:3px solid white; margin-bottom:10px;">
      <button class="btn-gold" id="btn-send" onclick="processFinal('Online Paid')">PAID - SEND ORDER</button>
    </div>
    <br><button onclick="document.getElementById('order-modal').style.display='none'" id="btn-back" style="background:none; border:none; color:#555; margin-top:10px; width:100%;">Cancel</button>
  </div>
</div>

<div id="bill-area">
    <h2 style="border-bottom:2px solid black; padding-bottom:5px;">🍳 EGG MASTER</h2>
    <p id="bill-cust-data" style="font-size:0.8rem; margin:10px 0; white-space: pre-line;"></p>
    <div id="bill-items-list" style="text-align:left; font-family:monospace; margin:15px 0;"></div>
    <h3 id="bill-grand-total" style="border-top:1px dashed #000; padding-top:10px;"></h3>
    <div id="bill-verify-code" style="font-size:10px; color:#888; margin-top:10px;"></div>
</div>
