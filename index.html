<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Egg Master Restaurant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff5722;
color:white;
padding:15px;
text-align:center;
font-size:25px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#ff5722;
font-weight:bold;
}

button{
background:#ff5722;
color:white;
border:none;
padding:10px;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
🍳 Egg Master Online Order
</header>

<div class="container" id="menu"></div>

<div class="cart">

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<label>Delivery Distance (KM)</label>
<input id="distance" type="number" value="1">

<br><br>

<button onclick="generateBill()">Generate Bill</button>
<button onclick="sendWhatsApp()">WhatsApp Order</button>
<button onclick="downloadPDF()">Download PDF Bill</button>

<h3 id="total"></h3>

</div>

<script>

const PHONE="+919586096174"

const menu=[

const menu=[

{
name:"Egg Bhurji",
price:60,
img:"https://source.unsplash.com/400x300/?egg-bhurji,indian"
},

{
name:"Egg Curry",
price:60,
img:"https://source.unsplash.com/400x300/?egg-curry,indian"
},

{
name:"Egg Masala",
price:40,
img:"https://source.unsplash.com/400x300/?egg-masala"
},

{
name:"Masala Omelette",
price:40,
img:"https://source.unsplash.com/400x300/?masala-omelette"
},

{
name:"Egg Fried Rice",
price:70,
img:"https://source.unsplash.com/400x300/?egg-fried-rice"
},

{
name:"Egg Biryani",
price:80,
img:"https://source.unsplash.com/400x300/?egg-biryani"
},

{
name:"Egg Kheema",
price:50,
img:"https://source.unsplash.com/400x300/?egg-keema"
},

{
name:"Surti Gotalo",
price:60,
img:"https://source.unsplash.com/400x300/?surti-gotalo"
},

{
name:"Boiled Omelette",
price:40,
img:"https://source.unsplash.com/400x300/?boiled-omelette"
},

{
name:"Bread Omelette",
price:60,
img:"https://source.unsplash.com/400x300/?bread-omelette"
}

]
]

let cart=[]

const menuDiv=document.getElementById("menu")

menu.forEach((item,i)=>{

menuDiv.innerHTML+=`

<div class="card">

<img src="${item.img}">

<h3>${item.name}</h3>

<div class="price">₹${item.price}</div>

<button onclick="addItem(${i})">Add</button>

</div>

`

})

function addItem(i){

cart.push(menu[i])
alert(menu[i].name+" added")

}

let billText=""

function generateBill(){

let total=0
let items=""

cart.forEach(i=>{

total+=i.price
items+=i.name+" ₹"+i.price+"\n"

})

let km=document.getElementById("distance").value

let delivery=km*10

let grand=total+delivery

document.getElementById("total").innerText="Total ₹"+grand

billText=

`Egg Master Order

Items
${items}

Delivery ₹${delivery}

Total ₹${grand}`

}

function sendWhatsApp(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

let msg=

`New Order

Name: ${name}
Phone: ${phone}
Address: ${address}

${billText}`

let url="https://wa.me/"+PHONE+"?text="+encodeURIComponent(msg)

window.open(url)

}

function downloadPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text(billText,20,20)

doc.save("egg-master-bill.pdf")

}

</script>

</body>
</html>
